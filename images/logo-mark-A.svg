<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Metonym mark — trajectory through state grid">
  <!-- Background state grid: 3x3, dim -->
  <g fill="none" stroke="#0F2A44" stroke-width="1.4" opacity="0.28">
    <circle cx="20" cy="20" r="3.5"/>
    <circle cx="50" cy="20" r="3.5"/>
    <circle cx="80" cy="20" r="3.5"/>
    <circle cx="20" cy="50" r="3.5"/>
    <circle cx="50" cy="50" r="3.5"/>
    <circle cx="80" cy="50" r="3.5"/>
    <circle cx="20" cy="80" r="3.5"/>
    <circle cx="50" cy="80" r="3.5"/>
    <circle cx="80" cy="80" r="3.5"/>
  </g>
  <!-- Trajectory line through clinically meaningful states -->
  <polyline points="20,80 50,50 80,50 80,20"
            fill="none"
            stroke="#0F2A44"
            stroke-width="2.2"
            stroke-linecap="round"
            stroke-linejoin="round"/>
  <!-- Filled trajectory dots (states recognized) -->
  <circle cx="20" cy="80" r="5.5" fill="#0F2A44"/>
  <circle cx="50" cy="50" r="5.5" fill="#0F2A44"/>
  <circle cx="80" cy="50" r="5.5" fill="#0F2A44"/>
  <!-- Recognition moment (gold) -->
  <circle cx="80" cy="20" r="6.5" fill="#B89548"/>
</svg>
