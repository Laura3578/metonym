<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Metonym mark — inflection point">
  <!-- Subtle horizon line (the "baseline" / expected) -->
  <line x1="15" y1="62" x2="85" y2="62"
        stroke="#0F2A44"
        stroke-width="1.5"
        stroke-linecap="round"
        opacity="0.22"
        stroke-dasharray="2 4"/>
  <!-- Inflection line: rising from baseline to recognition point -->
  <polyline points="20,72 50,62 80,28"
            fill="none"
            stroke="#0F2A44"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"/>
  <!-- Two anchor dots, then the moment -->
  <circle cx="20" cy="72" r="5.5" fill="#0F2A44" opacity="0.5"/>
  <circle cx="50" cy="62" r="5.5" fill="#0F2A44"/>
  <!-- Recognition moment (gold) -->
  <circle cx="80" cy="28" r="8" fill="#B89548"/>
</svg>
