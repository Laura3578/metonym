<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Metonym mark — escalation trajectory">
  <!-- Trajectory line -->
  <polyline points="15,82 40,58 65,58 85,22"
            fill="none"
            stroke="#0F2A44"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"/>
  <!-- Dots, increasing in opacity along the path: salience ramp -->
  <circle cx="15" cy="82" r="6" fill="#0F2A44" opacity="0.35"/>
  <circle cx="40" cy="58" r="6" fill="#0F2A44" opacity="0.6"/>
  <circle cx="65" cy="58" r="6" fill="#0F2A44" opacity="0.85"/>
  <!-- Recognition moment (gold) -->
  <circle cx="85" cy="22" r="7.5" fill="#B89548"/>
</svg>
